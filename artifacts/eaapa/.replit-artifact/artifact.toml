kind = "web"
previewPath = "/"
title = "EAAPA – East Africa Agripreneurs Alliance"
version = "1.0.0"
id = "artifacts/eaapa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23635

[services.development]
run = "pnpm --filter @workspace/eaapa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eaapa", "run", "build" ]
publicDir = "artifacts/eaapa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23635"
BASE_PATH = "/"
